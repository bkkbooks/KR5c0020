front:
  text: 皇天上清金闕帝君靈書紫文上經傷六
  hash: sha256:6c465ce96610986020ffbb533ba363ad3d29e2816e18c5ad13830a8b3e1ededa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0020_HFL_000-001a, image: hfl/0342/0342-004.png}
body:
  text: 五老上眞仙都君受聖君命授青童君青童君以傳王逺逰使下教骨相玄名有仙籍之人應得此文者方諸東宫東海青童大君清齋於靈榭丹闕黄房之内三年時乗碧霞三靈流景雲輿建帶飛青翠羽龍帔從桑林千眞上詣上清金闕請受靈書紫文上經金闕中有四帝君其後聖君處其左居太空瓊臺丹玕之殿侍女衆眞三萬人毒龍雷虎玃天之獸備門抱關蛟蛇千尋衛於墻析飛馬奔雀大翅之鳥叩啄奮爪陳于廣庭天威煥赫流光八朗風鼓玄旍廻舞旄蓋玉𣗳激音琳草作籟衆吹雲歌鳳鳴青泰神妃合唱鵬舞鸞邁青童旣到匍匐而前捧首北面而言曰小臣梵湄敢獻言於聖帝明皇几前在昔統拔太虚領宰飛眞察五靈之廣肆司玄師之逸觀騰濯清陽鳴鈴素町朗秀三觀菴藹妙覺廓落靈囿濯瀾青谷是以逡廵長羅髙歩玄老齊九鸞於閬崿之墟放流光於𡨋華之上浪達𩀱玄窮標靈觀沖漠靜於龍空藏毫芒於丹室啓神扉而委化隨形遷而散累是其時也纒梏披越神氣微夷蕭脫五神流練空洞鱗躍碧津慷慨條暢雖自足於八觀實無閡於霄映矣顧念眞才未啓靈璞寢磨欲使風灑蘭林奏籟雲涯發拔七爽剖凝喻幽不審靈書紫文可得而下教乎于時後聖君方擁机外化髙拂遐想方注筆於大洞玄經以教授諸上眞左卿及靈童玉女數百人也既不耳青童之陳辭又未暫輟詠於視矣於是青童君重啓伏膝進行固請不已爾乃聖君良久推机偃處怱爾長歎曰苦辭玄達精誠來悟子用心之至矣於是指㸃虚域有愍焉之容也爰乃引雲鈞之琴撫而彈之清靈響粲激落百音瓊振九虚徹朗太霄而歌大洞神州之章凝魂之曲玄詩靈藻天韻希微領照沖氣頻音清徽其辭曰玄虚上清氣三素凌華濛淵嚮啓靈扉七門扇羽童豁落丹霄觀清寥𡨋運彰有覺悟玄㑹涯棲飛太空陽臺太洞野幽逸英芝光遺界翳虚輪絶宅自𡨋通髙㑹玄辰闕寒首朝玉皇神映朱靈音虚鼓響瓊鐘九轡縱雲軿逍遥紫霞峯丹陵啓碧室緑庭披五房金闕煥嵯峨藹沬木蓋刀上清宫味此日月華盼彼無形方玄致三靈覺蕭條劫仞中何爲當塗坐五難乗子胷何不衘赤嬰乗我泥丸公不死亦不生不始亦不終於是聖君吟歌畢顧引青童使坐設流霞之漿鐶剛之果赤𣗳白子絳木青實乃命五老上眞仙都左公開紫蘂玉笈雲錦之囊出靈書紫文上經以付青童君下授有玄宫玉名當爲眞人者青童君退席稽首拜而受之以還方諸東宫靈書紫文上經是後聖李君自少學道所受修行要文者也乃太微天帝紫微上眞天帝玉清君二天帝口傳之訣爲眞之法上皇大度要事皆科拔撰集施行祝說先後相比條例相次爲一卷刻以紫玉爲簡青金爲文於是龜母案筆眞童拂筵天妃侍香玉童結編名之曰靈書紫文上經以付五老上眞仙都左公藏於紫蘂玉笈盛以雲錦之囊侍文者命玉女十人在文之左右侍聖君列紀者命玉童十人並司察有書之道士言功糺罪上聞上清玄中先師大過被考於三官小過奪紀以促年大罪禍及於三祖小罪止身以受殃輕慢則神去汚穢則文藏也學仙者開視靈文皆當起拜盥手燒香也天靈司察可不愼敬矣諸非傳授皆不得妄說篇目說則犯泄漏天文之科上清金闕靈書紫文採飲飛根吞日氣之法昔受之於太微天帝君一名赤丹金精石景水母之經也當常見日初出之時乃對日東向叩齒九通畢心中隂呪呼日魂之名日中五帝之字曰日魂朱景照韜緑映廻霞赤童玄炎飈像凡心祝呼此十六字畢仍瞑目握固存見日中五色流霞皆來接一身下至兩足又存令五色上至頭頂於是日光流霞五色俱來入口中又日光流霞之中自復有紫氣大如目童者累重數十炫煥在五光之中名之曰飛根水母也並俱與五氣來入口中向日吞霞作四十五咽氣咽氣畢又咽液九過畢又叩齒九通微呪曰赤廬丹氣圓天育精剛以受柔炎火隂英日辰元景號曰大明九陽齊化二煙俱生凝魂和魄五氣之精中生五帝乗光御形採飛以虚輟根得盈首巾龍華披朱帶青轡烏流玄霞映上清賜書玉簡金閣刻名飲食朝華與眞合靈飛仙太微上昇紫庭畢向日再拜眞仙之中萬人已上無有一人知日魂之名者矣此道玄妙非血食臭骸可得聽聞者也天隂無日可於室中所卧潔處存而爲之清修道士精通上感者都可不待見日而修之也若道士休粮山林長齋五嶽絶塵人間逺思清眞者得日日飲日根之霞吞太陽之精則立覺體生玉澤靣有流光也如其外累人事未獲靜形浮遊世路心拘榮網者要以月朔月三日月五日月七日月九日月十三日十五日十七日十九日二十五日案而爲之如上法一月之中十過也此日是日魂下接飛根盈滿水母辟夢之時也行之十八年上清當錬以金眞瑩以玉光位爲玉皇飛行太空乗華三素以映天下太微飲日氣開明靈符若不能常以月晦夜半書符者要不可失竒月晦也右月晦夜半朱書青紙上東向吞之以先告日魂也臨飲符時閉氣左手執符心祝曰太微丹書名曰開明致日上魂來化某形平旦嚴裝發自圓庭飛華水母日根金精紫映流光號爲五靈祝畢乃飲符上清金闕靈書紫文採飲隂華吞月精之法昔受之於太微天帝君一名黄氣陽精藏天隱月之經也當思見月初出之時也乃對月西向叩齒十通畢心中隂祝呼月魄之名月中五夫人之字曰月魄瞹蕭芬豔翳寥婉虚靈蘭鬱華結翹淳金清熒炅容臺標凡心祝呼此二十四字畢乃瞑目握固存見月中五色流精皆來接一身下至兩足又存令五氣上至頭頂於是月光流精五色俱來入口中又月光精之中自復有黄氣大如目童者累重數十相隨在月精光五色之中名曰飛黄月華之精也並俱與五氣來入口中向月吞精作五十咽畢咽液十過畢又叩齒十通微祝曰黄清玄暉元隂上氣散蔚寒飈條靈歛胃虚波瀾潁挺濯淳器月精夜景玄宫上貴五君夫人各保母位赤子飛入嬰兒續至廻隂三合光玄萬方和魂制魄五胎流通乗霞飛精逸虚於東首結靈雲景華招風左帶龍符右佩虎章鳳羽朱帔玉佩金璫騫𣗳結阿號曰木王神蟇控根有虧有充明精内映玄水吐梁賜書玉礼刻名雲房飲食月華與眞合同飛仙紫微上朝太皇祝畢向月再拜存日月坐立任所便耳仙官之中無有一人知月魄之名者矣其眞人當時有知之者若天隂無月可於室中爲之施行要訣如飲日光法夕夕爲之則立覺體生光照目有飛精也要法月二日四日六日八日十日十四日十六日十八日二十日二十二日二十四日一月之中十一過亦足成仙也此日之夕是隂陽之合三炁盈溢月水結華黄神下接之時也行之一十八年上清當錬魂易魄映以玉光乗玄轡景飛行太空紫微飲月精太玄隂生符若不能常以月晦夜半書符者要不可失偶月晦也正月爲竒二月爲偶右月晦夜半黄書青紙上東向飲之先以告月魄也是時當先飲開明靈符也飲月符閉炁右手執符心祝曰紫微黄書名曰太玄致月華水養魄和魂方中嚴事發自玄關藏天隱月五靈夫人飛光九道映朗泥丸祝畢乃飲符太微靈書紫文拘三魂之法月三日月十三日月二十三日夕是此時也三魂不定爽靈浮遊胎光放形幽精擾喚其爽靈胎光幽精三君是三魂之神名也其夕皆棄身遊遨飈逝本室或爲他魂外鬼所見留制或爲魅物所得收録或不得還反離形放質或犯於外魂二氣共戰皆躁競赤子使爲他念去來無形心悲意悶也道士皆當拘而留之使無遊逸矣拘留之法當安眠向上下枕伸足交手心上瞑目閉氣三息叩齒三通存心有赤氣如雞子從内仰上出於目中從目中出外赤氣轉大覆身下流身體上至頭頂變而成火因以繞身使帀一身今内外洞徹有如然炭之狀都畢其時當覺體中小𤍽乃又叩齒三通畢存呼三魂名爽靈胎光幽精三神急住因微祝曰太微玄官中黄始青内錬三魂胎光安寧神寳玉室與我俱生不得妄動鑒者太靈若欲飛行唯得詣太極上清若欲飢渇唯得飲徊水玉精太微靈書紫文制七魄之法月朔月望月晦夕是此時也七魄流蕩遊走穢濁或交通血食徃鬼來魅或與死尸共相關入或淫惑赤子聚姦伐宅或言人之罪詣三官河伯或變爲魍魎使人厭魅或將鬼入身呼邪殺質諸殘病生人皆魄之罪樂人之死皆魄之性欲人之敗皆魄之疾道士當制而勵之錬而變之御而正之攝而威之其第一魄名尸狗第二魄名伏矢第三魄名雀隂第四魄名吞賊第五魄名非毒第六魄名除穢第七魄名臭肺此皆七魄之隂名也身中之濁鬼也制檢之法當正卧去枕伸足兩手掌心掩兩耳令指端相接交於項中閉息七過叩齒七通存鼻端有白氣如小豆須㬰漸大以冠身九重下至兩足上至頭上旣畢於是白氣忽又變成天獸使兩青龍在兩目中兩白虎在兩鼻孔中皆向外朱雀在心上向人口蒼龜在左足下靈蛇在右足下兩耳中有玉女著玄錦衣當耳門兩手各把火光良久都畢又咽液七過叩齒七通呼七魄名畢乃微祝曰素氣九回制魄邪凶天獸守門嬌女執關錬魄和柔與我相安不得妄動看察形源若汝飢渇聽飲月黄日丹右祝誦都畢於是七魄内閉相守受制若常行之則魄濁下消反善合形上和三宫與元合靈人一身有三元宫神命門有玄關大君及三魂之神合七神皆在形中欲令人長生仁慈大吉之君也其七魄亦受生於一身而與身爲攻伐之賊故當制之道士徒知求仙之方而不知制魄之道亦不免於徒勞三元宫所在其上元宫泥丸中也其神赤子字三元先一名帝卿中元宫絳房中心是也其神眞人字子南丹一名中光堅下元丹田宫臍下三寸也其神嬰兒字元陽昌一名谷下玄此三一之神矣欲拘制魂魄時皆先隂呼其名存三神皆玉色金光有嬰孩之貌中上二元皆衣赤下元衣黄頭如嬰兒始生之狀也行道服氣時亦存呼名字命門臍也玄關是始生胞腸之通路也其中有生宫宫内有大君名桃康字合延著朱衣巾紫蓉冠坐當命門其三魂神侍側焉大君常手執天皇象符以合注元氣補胎反胞暮卧先閉氣二十四息乃心祝大君名三通因咽液五十過又三叩齒微祝曰胎靈大神皇綱天君手執胞符首冠紫冠黄𢌞赤轉上精命門化神反生六合相因形骸光澤玉女棲身畢能常行之十八年大君將能左激三田右御三氣田化成飛轝氣化成玄龍仰役二十四神俯使魂靈呼陽官六甲召隂官六丁千乗萬騎白日升天皆桃君之感致也太微天帝君天皇象符一名帝君九廻元五通八間符若禮祝於别室當先書此符盛以錦囊佩之然後乃得行之右天皇象符以付生宫大君桃康合延合元上氣理胞運精朱書青紙月旦月望夜半北向服之以左手執符閉氣心祝曰天帝玄書皇象靈符以合元氣運精反胞萬年嬰孩飛仙天樞生宫大君披丹建朱首戴紫蓉與我同謀畢乃服服畢起再拜服符時於所寢牀上也若道士有行還精之道囘黄轉赤朝精灌命注津漑液使男女共丹面生玉澤者宜知大君之名要服象符以不老矣若徒行事而不知神名還精而不知服此符不見其祝說不測其宫府所注者雖獲千歳之壽故自歸尸於太隂徒積歴紀之生故應還骨於三官也道士暮卧常存大君爲祝說之法朔望服符以運胎精之益者如此亦成仙人可不煩男女還補之術也然御女以要飛騰囘氣以求天仙嶮巇甚於水火殺伐速於斧釿自非灰心抱一之性殆不可以此取䘮失者也中方行之所謂吞劒而欲喉咽不傷當可得耶生宫大神君忌人食生血忌燒六畜毛忌燒葫蒜皮葉及諸葷菜輩皆伐亂胎氣臭傷嬰神愼之焉皇天上清金闕帝君靈書紫文上經
